services:
  postgres:
    image: postgres:16-alpine
    container_name: dk_ncaab_pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dk
      POSTGRES_PASSWORD: dk
      POSTGRES_DB: dk_ncaab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dk -d dk_ncaab"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: dk_ncaab_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DKNCAAB_DATABASE__URL: "postgresql+psycopg2://dk:dk@postgres:5432/dk_ncaab"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build: .
    container_name: dk_ncaab_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_BASE: "http://api:8000"
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

volumes:
  pgdata:
